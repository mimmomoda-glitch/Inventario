<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Salerno Jet App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --text: #f8fafc; 
            --cyan: #22d3ee; 
            --amber: #fbbf24; 
            --border: #334155; 
            --key-bg: #334155;
        }
        
        body { background: var(--bg); color: var(--text); font-family: sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .active-tab { border-bottom: 4px solid var(--cyan); color: var(--cyan) !important; }
        
        .category-label { color: var(--amber); font-weight: bold; margin: 20px 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; font-size: 13px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 12px; border-radius: 10px; margin-bottom: 6px; border: 1px solid var(--border); }
        .item-row.selected { border-color: var(--cyan); background: #1e293b; box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); }
        .qty-box { width: 70px; height: 35px; background: #000; border: 1px solid var(--border); color: var(--cyan); text-align: center; border-radius: 5px; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .keypad { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; padding: 8px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; box-sizing: border-box; border-top: 2px solid var(--cyan); z-index: 1000; }
        .key { background: var(--key-bg); color: white; border: none; padding: 12px 0; font-size: 18px; font-weight: bold; border-radius: 6px; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
        .key:active { background: var(--cyan); color: #000; }
        .key.op { background: #475569; color: var(--amber); }
        .key.del { background: #7f1d1d; }
        .action-key { grid-column: span 2; font-size: 12px; height: 45px; }

        .row-checked { background-color: #f1f5f9 !important; }
        #signature-pad { touch-action: none; cursor: crosshair; background-color: white; border: 2px solid #000; border-radius: 8px; width: 100%; height: 150px; }

        .header-container { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; }
        .title-box { flex: 1; min-width: 0; }
        .title-box h1 { font-size: 1.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-group { display: flex; gap: 4px; flex-shrink: 0; }

        @media print { 
            @page { margin: 1cm; }
            .no-print, .keypad, header { display: none !important; } 
            body { background: white !important; color: black !important; padding: 0 !important; } 
            #section-inventario { display: block !important; padding: 0 !important; width: 100% !important; }
            .bg-white { box-shadow: none !important; border: none !important; }
            .bg-slate-900 { background: white !important; color: black !important; border-bottom: 2px solid black !important; padding: 10px 0 !important; }
            .inventory-table { width: 100% !important; border: 2px solid black !important; }
            .inventory-table th { background: #eee !important; color: black !important; border: 1px solid black !important; font-size: 12pt !important; }
            .inventory-table td { border: 1px solid black !important; color: black !important; font-size: 11pt !important; padding: 6px !important; }
            .item-value { color: black !important; font-weight: bold !important; font-size: 11pt !important; }
            .total-cell { background: #f9f9f9 !important; color: black !important; font-weight: 900 !important; font-size: 12pt !important; }
            #display-mezzo { color: black !important; font-size: 20pt !important; }
            #signature-pad { border: 1px solid black !important; height: 120px !important; }
        }
    </style>
</head>
<body class="pb-80">

    <header class="bg-slate-900 sticky top-0 z-50 shadow-xl no-print">
        <div class="flex justify-around p-4 text-slate-400 font-black text-xs tracking-widest uppercase">
            <button id="tab-ordine" onclick="switchTab('ordine')" class="active-tab pb-2 px-2">📦 Carico</button>
            <button id="tab-inventario" onclick="switchTab('inventario')" class="pb-2 px-2">📋 Inventario</button>
        </div>
    </header>

    <main id="section-ordine" class="p-4 max-w-2xl mx-auto">
        <div class="header-container mb-4">
            <div class="title-box">
                <h1 class="text-cyan-400 font-black">ORDINE CARICO</h1>
            </div>
            <div class="btn-group">
                <button onclick="salvaCaricoTxt()" class="bg-slate-700 px-2 py-1.5 rounded text-[10px] font-bold uppercase text-white">Salva</button>
                <button onclick="resetCarico()" class="bg-red-900 px-2 py-1.5 rounded text-[10px] font-bold uppercase text-white">Reset</button>
            </div>
        </div>
        <div id="ordine-container"></div>
    </main>

    <main id="section-inventario" class="hidden p-4 max-w-4xl mx-auto">
        <div class="bg-white shadow-2xl rounded-xl overflow-hidden text-black">
            <div class="bg-slate-900 text-white p-4">
                <div class="flex flex-col gap-4">
                    <div class="header-container">
                        <div class="title-box">
                            <h1 id="display-mezzo" class="font-black uppercase tracking-tight">SALERNO JET</h1>
                        </div>
                        <div class="btn-group no-print">
                            <button onclick="salvaTxt()" class="bg-slate-700 px-2 py-1.5 rounded-lg font-bold text-[10px]">TXT</button>
                            <button onclick="document.getElementById('import-file').click()" class="bg-slate-700 px-2 py-1.5 rounded-lg font-bold text-[10px]">IMP</button>
                            <input type="file" id="import-file" class="hidden" accept=".txt" onchange="importaTxt(this)">
                            <button onclick="window.print()" class="bg-blue-600 px-2 py-1.5 rounded-lg font-bold text-[10px]">PDF</button>
                        </div>
                    </div>
                    <select id="mezzo-select-inv" onchange="caricaMezzo(this.value)" class="no-print bg-slate-800 border-none text-white text-xs rounded-lg p-2 font-bold flex-grow">
                        <option value="salerno">SALERNO JET (Report 03/05)</option>
                        <option value="napoli">NAPOLI JET</option>
                        <option value="amalfi">AMALFI JET</option>
                        <option value="super">SUPER JET</option>
                        <option value="capri">CAPRI JET</option>
                        <option value="ischia">ISCHIA JET</option>
                    </select>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full border-collapse inventory-table">
                    <thead class="bg-slate-100">
                        <tr class="text-slate-600 uppercase text-[10px] font-black border-b-2 border-black">
                            <th class="py-2 px-1 border no-print w-8 text-center">OK</th>
                            <th class="py-2 px-2 border text-left">Articolo</th>
                            <th class="py-2 px-2 border text-left w-24">Conteggio</th>
                            <th class="py-2 px-2 border text-center w-16">Tot</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-body" class="text-black text-xs md:text-sm"></tbody>
                </table>
            </div>

            <div class="p-4 bg-slate-50 border-t-2 border-black flex flex-col items-center">
                <span class="text-[10px] uppercase font-black text-slate-500 mb-2 tracking-widest">Firma Responsabile</span>
                <canvas id="signature-pad"></canvas>
                <button onclick="clearSignature()" class="no-print mt-2 text-[10px] text-red-500 font-bold uppercase">Cancella Firma</button>
            </div>
        </div>
    </main>

    <div id="main-keypad" class="keypad no-print">
        <button class="key" onclick="press('7')">7</button>
        <button class="key" onclick="press('8')">8</button>
        <button class="key" onclick="press('9')">9</button>
        <button class="key op" onclick="press(':')">:</button>
        <button class="key" onclick="press('4')">4</button>
        <button class="key" onclick="press('5')">5</button>
        <button class="key" onclick="press('6')">6</button>
        <button class="key op" onclick="press('*')">*</button>
        <button class="key" onclick="press('1')">1</button>
        <button class="key" onclick="press('2')">2</button>
        <button class="key" onclick="press('3')">3</button>
        <button class="key op" onclick="press('-')">-</button>
        <button class="key del" onclick="press('DEL')">⌫</button>
        <button class="key" onclick="press('0')">0</button>
        <button class="key op" onclick="press('+')">+</button>
        <button class="key op" onclick="press('.')">.</button>
        <button class="key action-key bg-cyan-500 text-slate-900" onclick="copiaOrdine()">📋 COPIA WHATSAPP</button>
        <button class="key action-key bg-emerald-600 text-white" onclick="window.print()">🖨️ PDF / STAMPA</button>
    </div>

    <script>
        const catalogoOrdine = [
            { c: "Bevande", i: ["Acqua Naturale", "Acqua Frizzante", "Acqua 2 Litri", "Coca", "Coca 0", "Fanta", "Sprite", "Lemonsoda", "The Pesca", "The Limone", "Birra Peroni", "Peroni Capri", "Spritz", "Red Bull", "Gatorade", "Vino Aglianico", "Vino Falanghina", "Vino 0,25", "Prosecco 0,25", "Succhi", "Limoncello/Amaro"] },
            { c: "Caffetteria", i: ["Caffè", "Decaffeinato", "Cialde", "Ginseng", "Orzo", "Latte", "Dietor", "Thè / Camomilla"] },
            { c: "Snack & Food", i: ["Patatine", "Fonzies", "Pringles", "Ritz", "Tuc", "Arachidi", "Nik Nok", "Mikado", "Mars", "Snickers", "Twix", "Kit Kat", "M&M's", "Kinder Bueno", "Bready", "Kinder Biscuit", "Kinder Card", "Gomme", "Caramelle", "Muffin", "Oreo", "Ringo", "Fitness", "Pavesini"] },
            { c: "Extra", i: ["Borse G", "Borse M", "Cappelli", "Impermeabili", "Maglie"] }
        ];

        const dbInventario = {
            salerno: [
                {n:"💧 ACQUA",v:"350"}, {n:"🥜 ARACHIDI",v:"10"}, {n:"🛍️ BORSE P.",v:"245"}, {n:"🛍️ BORSE M.",v:"0"}, {n:"👜 BORSE G.",v:"28"}, {n:"🍫 BUENO/BISCUITS",v:"86"}, {n:"🧢 CAPPELLI",v:"117"}, {n:"🍬 CARAMELLE",v:"128"}, {n:"☕ CIALDE",v:"124"}, {n:"☕ DECA",v:"4"}, {n:"🍬 DIETOR",v:"15"}, {n:"🌾 FITNESS",v:"4"}, {n:"🍟 FONZIES/PAT.",v:"36"}, {n:"☕ GINSENG",v:"17"}, {n:"🧥 IMPERMEAB.",v:"50"}, {n:"🥛 LATTE",v:"6"}, {n:"🥤 LATTINE",v:"331"}, {n:"👕 MAGLIE",v:"89"}, {n:"🥢 MIKADO",v:"50"}, {n:"🧁 MUFFIN",v:"60"}, {n:"🥜 NIK NOK",v:"26"}, {n:"☕ ORZO",v:"50"}, {n:"🍪 PAVESINI",v:"14"}, {n:"🍺 PERONI",v:"149"}, {n:"🍋 PERONI CAPRI",v:"53"}, {n:"🥔 PRINGLES",v:"23"}, {n:"🍷 PROSECCO/VINO",v:"102"}, {n:"⚡ RED BULL/GAT.",v:"36"}, {n:"🍪 RINGO/OREO",v:"121"}, {n:"🥨 RITZ/CIPSTER",v:"22"}, {n:"🍹 SPRITZ",v:"33"}, {n:"🧃 SUCCO",v:"24"}, {n:"🍵 THE/CAMOM.",v:"57"}, {n:"🍪 TUC",v:"9"}, {n:"🍫 TWIX/KITKAT",v:"95"}
            ],
            default: ["💧 ACQUA", "🥜 ARACHIDI", "🛍️ BORSE P.", "🛍️ BORSE M.", "👜 BORSE G.", "🍫 BUENO/BISCUITS", "🧢 CAPPELLI", "🍬 CARAMELLE", "☕ CIALDE", "☕ DECA", "🍬 DIETOR", "🌾 FITNESS", "🍟 FONZIES/PAT.", "☕ GINSENG", "🧥 IMPERMEAB.", "🥤 LATTINE", "👕 MAGLIE", "🥢 MIKADO", "🧁 MUFFIN", "🥜 NIK NOK", "☕ ORZO", "🍪 PAVESINI", "🍺 PERONI", "🍋 PERONI CAPRI", "🥔 PRINGLES", "🍷 PROSECCO/VINO", "⚡ RED BULL/GAT.", "🍪 RINGO/OREO", "🥨 RITZ/CIPSTER", "🍹 SPRITZ", "🧃 SUCCO", "🍵 THE/CAMOM.", "🍪 TUC", "🍫 TWIX/KITKAT"]
        };

        let selectedElement = null;

        function init() {
            const container = document.getElementById('ordine-container');
            const savedCarico = JSON.parse(localStorage.getItem('carico_salerno_jet')) || {};
            
            catalogoOrdine.forEach(cat => {
                let h = document.createElement('div'); h.className = 'category-label'; h.innerText = cat.c; container.appendChild(h);
                cat.i.forEach(art => {
                    let r = document.createElement('div'); r.className = 'item-row';
                    r.onclick = () => selectRow(r, art);
                    const safeId = art.replace(/[^a-zA-Z0-9]/g, '_');
                    const savedVal = savedCarico[safeId] || "0";
                    r.innerHTML = `<span class="name text-sm">${art}</span><div class="qty-box" id="qty-${safeId}">${savedVal}</div>`;
                    container.appendChild(r);
                });
            });

            const savedInv = JSON.parse(localStorage.getItem('inventario_salerno_jet'));
            if (savedInv) {
                caricaMezzo(null, savedInv);
            } else {
                caricaMezzo('salerno');
            }
            
            initCanvas();
        }

        function switchTab(tab) {
            document.getElementById('section-ordine').classList.toggle('hidden', tab !== 'ordine');
            document.getElementById('section-inventario').classList.toggle('hidden', tab !== 'inventario');
            document.getElementById('main-keypad').classList.toggle('hidden', tab !== 'ordine');
            document.getElementById('tab-ordine').classList.toggle('active-tab', tab === 'ordine');
            document.getElementById('tab-inventario').classList.toggle('active-tab', tab === 'inventario');
        }

        function selectRow(el, id) {
            document.querySelectorAll('.item-row').forEach(r => r.classList.remove('selected'));
            el.classList.add('selected');
            const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');
            selectedElement = document.getElementById(`qty-${safeId}`);
        }

        function press(val) {
            if (!selectedElement) return;
            let current = selectedElement.innerText;
            if (val === 'DEL') {
                selectedElement.innerText = current.length > 1 ? current.slice(0, -1) : "0";
            } else {
                selectedElement.innerText = (current === "0" && val !== '.') ? val : current + val;
            }
            saveState();
        }

        function saveState() {
            const carico = {};
            document.querySelectorAll('.qty-box').forEach(box => {
                carico[box.id.replace('qty-', '')] = box.innerText;
            });
            localStorage.setItem('carico_salerno_jet', JSON.stringify(carico));

            const inv = [];
            document.querySelectorAll('#inventory-body tr').forEach(r => {
                const nameNode = r.querySelector('.item-name');
                const valNode = r.querySelector('.item-value');
                if (nameNode && valNode) {
                    inv.push({ n: nameNode.innerText, v: valNode.value });
                }
            });
            localStorage.setItem('inventario_salerno_jet', JSON.stringify(inv));
        }

        function resetCarico() {
            if(!confirm("Cancellare tutto l'ordine attuale?")) return;
            document.querySelectorAll('.qty-box').forEach(box => box.innerText = "0");
            saveState();
        }

        function copiaOrdine() {
            let t = `📦 *ORDINE CARICO*\n📅 ${new Date().toLocaleDateString()}\n--------------------------\n`;
            let hasItems = false;
            document.querySelectorAll('.qty-box').forEach(box => {
                if(box.innerText !== "0") {
                    const name = box.id.replace('qty-','').replace(/_/g,' ');
                    t += `▪️ *${name}:* ${box.innerText}\n`;
                    hasItems = true;
                }
            });
            if(!hasItems) return alert("Nessun prodotto inserito!");
            const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert("Ordine Copiato!");
        }

        function caricaMezzo(id, datiImportati = null) {
            const select = document.getElementById('mezzo-select-inv');
            if (id) document.getElementById('display-mezzo').innerText = select.options[select.selectedIndex].text;
            const body = document.getElementById('inventory-body');
            body.innerHTML = "";
            const dati = datiImportati || dbInventario[id] || dbInventario.default.map(n => ({n, v:"0"}));
            dati.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-200 transition";
                const total = item.v.toString().split('+').reduce((a, b) => a + (parseInt(b.trim()) || 0), 0);
                tr.innerHTML = `
                    <td class="p-2 border no-print text-center"><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-checked')" class="w-5 h-5"></td>
                    <td class="p-2 border font-bold item-name">${item.n}</td>
                    <td class="p-1 border"><input type="text" oninput="updateT(this)" class="item-value w-full bg-transparent font-mono text-blue-800 font-bold outline-none" value="${item.v}"></td>
                    <td class="p-1 border text-center font-black bg-slate-50 total-cell">${total}</td>`;
                body.appendChild(tr);
            });
        }

        function updateT(i){ 
            const s = i.value.split('+').reduce((a,b)=>a+(parseInt(b.trim())||0),0); 
            const row = i.parentElement.parentElement;
            const totalCell = row.querySelector('.total-cell');
            if (totalCell) totalCell.innerText = s; 
            saveState();
        }

        function salvaTxt() {
            const mezzo = document.getElementById('display-mezzo').innerText;
            let contenuto = `INVENTARIO: ${mezzo}\nDATA: ${new Date().toLocaleString()}\n\n`;
            document.querySelectorAll('#inventory-body tr').forEach(r => {
                const nome = r.querySelector('.item-name')?.innerText;
                const valore = r.querySelector('.item-value')?.value;
                const totale = r.querySelector('.total-cell')?.innerText;
                if (nome) contenuto += `${nome} | ${valore} | TOT: ${totale}\n`;
            });
            const blob = new Blob([contenuto], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Inventario_${mezzo.replace(/\s+/g, '_')}.txt`;
            a.click();
        }

        function salvaCaricoTxt() {
            let contenuto = `ORDINE CARICO\nDATA: ${new Date().toLocaleString()}\n\n`;
            document.querySelectorAll('.qty-box').forEach(box => {
                if(box.innerText !== "0") {
                    contenuto += `${box.id.replace('qty-','').replace(/_/g,' ')}: ${box.innerText}\n`;
                }
            });
            const blob = new Blob([contenuto], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Carico_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
        }

        function importaTxt(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const righe = e.target.result.split('\n');
                const datiCaricati = [];
                righe.forEach(riga => {
                    if (riga.includes("|")) {
                        const parti = riga.split("|");
                        datiCaricati.push({ n: parti[0].trim(), v: parti[1].trim() });
                    }
                });
                if (datiCaricati.length > 0) {
                    caricaMezzo(null, datiCaricati);
                    saveState();
                    alert("Dati importati!");
                }
            };
            reader.readAsText(file);
        }

        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('signature-pad');
            if(!canvas) return;
            ctx = canvas.getContext('2d');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.strokeStyle = "#000";
            const getP = (e) => {
                const r = canvas.getBoundingClientRect();
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: x - r.left, y: y - r.top };
            };
            const start = (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if(drawing){ const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); } };
            const stop = () => drawing = false;
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
        }
        function clearSignature() { if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); }
        window.onload = init;
    </script>
</body>
</html>
