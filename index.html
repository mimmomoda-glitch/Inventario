<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Flotta Totale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none !important; } }
        .row-checked { background-color: #f0fdf4; opacity: 0.7; }
        #signature-pad { touch-action: none; cursor: crosshair; background-color: white; border: 2px dashed #cbd5e1; border-radius: 12px; }
    </style>
</head>
<body class="bg-slate-100 py-4 px-2 antialiased">

    <div class="max-w-4xl mx-auto bg-white shadow-2xl rounded-xl overflow-hidden">
        
        <div class="bg-slate-900 text-white p-6">
            <div class="flex flex-col gap-4">
                <div class="flex justify-between items-center">
                    <h1 id="display-mezzo" class="text-2xl font-black uppercase">SELEZIONA JET</h1>
                    <button onclick="window.print()" class="no-print bg-blue-600 px-4 py-2 rounded-lg font-bold text-sm">STAMPA PDF</button>
                </div>
                
                <select id="mezzo-select" onchange="caricaMezzo(this.value)" class="no-print bg-slate-800 border-none text-white text-sm rounded-lg p-3 font-bold flex-grow">
                    <option value="">-- CLICCA QUI PER CAMBIARE MEZZO --</option>
                    <option value="napoli">NAPOLI JET</option>
                    <option value="salerno">SALERNO JET</option>
                    <option value="amalfi">AMALFI JET</option>
                    <option value="super">SUPER JET</option>
                    <option value="capri">CAPRI JET</option>
                    <option value="ischia">ISCHIA JET</option>
                    <option value="tremiti">TREMITI JET</option>
                    <option value="vesuvio">VESUVIO JET</option>
                    <option value="jumbo">JUMBO JET</option>
                    <option value="sorrento">SORRENTO JET</option>
                    <option value="giunone">GIUNONE JET</option>
                    <option value="europa">EUROPA JET</option>
                    <option value="cds">CITTÀ DI SORRENTO</option>
                    <option value="apollo">APOLLO</option>
                    <option value="freccia">FRECCIA D'ARGENTO</option>
                    <option value="bliz">BLIZ</option>
                    <option value="mar3">ISCHIA MAR 3</option>
                    <option value="uragano">URAGANO</option>
                    <option value="acquarius">ACQUARIUS</option>
                    <option value="raid">RAID</option>
                </select>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full border-collapse">
                <thead class="bg-slate-100">
                    <tr class="text-slate-600 uppercase text-[10px] font-black">
                        <th class="py-3 px-2 border no-print w-10 text-center">OK</th>
                        <th class="py-3 px-4 border text-left">Articolo</th>
                        <th class="py-3 px-4 border text-left">Conteggio</th>
                        <th class="py-3 px-4 border text-center w-20">Tot</th>
                    </tr>
                </thead>
                <tbody id="inventory-body" class="text-slate-800 text-sm">
                    <tr><td colspan="4" class="p-10 text-center text-slate-400">Scegli un mezzo sopra per caricare i dati</td></tr>
                </tbody>
            </table>
        </div>

        <div class="p-6 bg-slate-50 border-t flex flex-col items-center">
            <span class="text-[10px] uppercase font-black text-slate-500 mb-2 tracking-widest">Firma Responsabile</span>
            <canvas id="signature-pad" class="w-full h-32"></canvas>
        </div>
    </div>

    <script>
        const db = {
            napoli: [
                {n:"💧 ACQUA",v:"313"}, {n:"🥜 ARACHIDI+",v:"28"}, {n:"👜 BORSE G",v:"5"}, {n:"🛍️ BORSE M",v:"1"}, {n:"🍫 BUENO/BISC",v:"55"}, {n:"🧢 CAPPELLI",v:"175"}, {n:"🍬 CARAMELLE",v:"56"}, {n:"☕ DECA",v:"20"}, {n:"🍬 DIETOR",v:"17"}, {n:"🌾 FITNESS",v:"33"}, {n:"🍟 FONZIES",v:"45"}, {n:"🧥 IMPERMEAB",v:"70"}, {n:"☕ GINSENG",v:"10"}, {n:"🥤 LATTINE",v:"338"}, {n:"👕 MAGLIE",v:"83"}, {n:"🥢 MIKADO",v:"17"}, {n:"🧁 MUFFIN",v:"17"}, {n:"🥜 NIK NOK",v:"15"}, {n:"☕ ORZO",v:"10"}, {n:"🍪 PAVESINI",v:"4"}, {n:"🍺 PERONI",v:"115"}, {n:"🍋 PERONI C.",v:"24"}, {n:"🥔 PRINGLES",v:"62"}, {n:"🍷 PROSECCO",v:"59"}, {n:"⚡ RED BULL",v:"55"}, {n:"🍪 RINGO/OREO",v:"96"}, {n:"🥨 RITZ",v:"12"}, {n:"🍹 SPRITZ",v:"57"}, {n:"🧃 SUCCO",v:"53"}, {n:"🍵 THE/CAMOM",v:"88"}, {n:"🍪 TUC",v:"14"}, {n:"🍫 TWIX/KIT KAT",v:"170"}
            ],
            salerno: [
                {n:"💧 ACQUA",v:"72+19+24"}, {n:"🥜 ARACHIDI+",v:"4+12"}, {n:"👜 BORSE G",v:"11+4+6+2"}, {n:"🍫 BUENO/BISC",v:"35"}, {n:"🧢 CAPPELLI",v:"116"}, {n:"🍬 CARAMELLE",v:"37+40"}, {n:"☕ CIALDE",v:"140"}, {n:"☕ DECA",v:"4"}, {n:"🍬 DIETOR",v:"22"}, {n:"🌾 FITNESS",v:"15"}, {n:"🍟 FONZIES",v:"6+9+3+22+21"}, {n:"☕ GINSENG",v:"18"}, {n:"🥛 LATTE",v:"4"}, {n:"🥤 LATTINE",v:"63+158+7+6"}, {n:"👕 MAGLIE",v:"137"}, {n:"🥢 MIKADO",v:"17"}, {n:"🧁 MUFFIN",v:"28"}, {n:"🥜 NIK NOK",v:"17"}, {n:"☕ ORZO",v:"50"}, {n:"🍪 PAVESINI",v:"18"}, {n:"🍺 PERONI",v:"112+20+22+2"}, {n:"🍋 PERONI C.",v:"30+10+4"}, {n:"🥔 PRINGLES",v:"36+28"}, {n:"🍷 PROSECCO",v:"20+10+20+30"}, {n:"⚡ RED BULL",v:"38"}, {n:"🍪 RINGO/OREO",v:"100"}, {n:"🥨 RITZ",v:"15+10"}, {n:"🍹 SPRITZ",v:"50"}, {n:"🧃 SUCCO",v:"16"}, {n:"🍵 THE/CAMOM",v:"63"}, {n:"🍪 TUC",v:"14"}, {n:"🍫 TWIX/KIT KAT",v:"51+20+11"}
            ],
            default: ["💧 ACQUA", "🥜 ARACHIDI+", "👜 BORSE G", "🛍️ BORSE M", "🍫 BUENO/BISC", "🧢 CAPPELLI", "🍬 CARAMELLE", "🍪 CHOCO CHIPS", "☕ CIALDE", "☕ DECA", "🍬 DIETOR", "🌾 FITNESS", "🍟 FONZIES", "☕ GINSENG", "🧥 IMPERMEAB", "🃏 KINDER CARDS", "🥤 LATTINE", "🍫 M&M", "👕 MAGLIE", "🥢 MIKADO", "🧁 MUFFIN", "🥜 NIK NOK", "☕ ORZO", "🍪 PAVESINI", "🍺 PERONI", "🍋 PERONI C.", "🥔 PRINGLES", "🍷 PROSECCO", "⚡ RED BULL", "🍪 RINGO/OREO", "🥨 RITZ", "🍹 SPRITZ", "🧃 SUCCO", "🍵 THE/CAMOM", "🍪 TUC", "🍫 TWIX/KIT KAT"]
        };

        function caricaMezzo(id) {
            if (!id) return;
            document.getElementById('display-mezzo').innerText = document.getElementById('mezzo-select').options[document.getElementById('mezzo-select').selectedIndex].text;
            const body = document.getElementById('inventory-body');
            body.innerHTML = "";
            const dati = db[id] || db.default.map(n => ({n, v:"0"}));
            dati.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-200 transition";
                const total = item.v.split('+').reduce((a, b) => a + (parseInt(b.trim()) || 0), 0);
                tr.innerHTML = `
                    <td class="p-2 border text-center no-print"><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-checked')" class="w-5 h-5"></td>
                    <td class="p-3 border font-bold">${item.n}</td>
                    <td class="p-2 border"><input type="text" oninput="updateT(this)" class="w-full bg-transparent font-mono text-blue-600 font-bold" value="${item.v}"></td>
                    <td class="p-2 border text-center font-black bg-slate-50 total-cell">${total}</td>`;
                body.appendChild(tr);
            });
        }

        function updateT(i){ const s = i.value.split('+').reduce((a,b)=>a+(parseInt(b.trim())||0),0); i.parentElement.parentElement.querySelector('.total-cell').innerText=s; }
        const c = document.getElementById('signature-pad'); const ctx = c.getContext('2d'); let d = false;
        function getP(e){ const r = c.getBoundingClientRect(); const x = e.touches ? e.touches[0].clientX : e.clientX; const y = e.touches ? e.touches[0].clientY : e.clientY; return { x: x - r.left, y: y - r.top }; }
        c.addEventListener('touchstart', (e)=>{ d=true; ctx.beginPath(); const p=getP(e); ctx.moveTo(p.x, p.y); e.preventDefault(); }, {passive:false});
        c.addEventListener('touchmove', (e)=>{ if(d){ const p=getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); } }, {passive:false});
        window.addEventListener('touchend', ()=> d=false);
        window.onload = () => { c.width = c.offsetWidth; c.height = c.offsetHeight; ctx.lineWidth = 2.5; ctx.lineCap="round"; ctx.strokeStyle="#0f172a"; };
    </script>
</body>
</html>
