    <script>
        const listaBarche = ["NAPOLI JET", "SALERNO JET", "AMALFI JET", "SUPER JET", "CAPRI JET", "ISCHIA JET", "TREMITI JET", "VESUVIO JET", "JUMBO JET", "SORRENTO JET", "GIUNONE JET", "EUROPA JET", "CITTÀ DI SORRENTO", "APOLLO", "FRECCIA D ARGENTO", "BLIZ", "ISCHIA MAR 3", "URAGANO", "ACQUARIUS", "RAID"];

        const catalogoOrdine = [
            { c: "Bevande", i: ["Acqua Naturale", "Acqua Frizzante", "Acqua 2 Litri", "Coca", "Coca 0", "Fanta", "Sprite", "Lemonsoda", "The Pesca", "The Limone", "Birra Peroni", "Peroni Capri", "Spritz", "Red Bull", "Gatorade", "Vino Aglianico", "Vino Falanghina", "Vino 0,25", "Prosecco 0,25", "Succhi", "Limoncello/Amaro"] },
            { c: "Caffetteria", i: ["Caffè", "Decaffeinato", "Cialde", "Ginseng", "Orzo", "Latte", "Dietor", "Thè / Camomilla"] },
            { c: "Snack & Food", i: ["Patatine", "Fonzies", "Pringles", "Ritz", "Tuc", "Arachidi", "Nik Nok", "Mikado", "Mars", "Snickers", "Twix", "Kit Kat", "M&M's", "Kinder Bueno", "Bready", "Kinder Biscuit", "Kinder Card", "Gomme", "Caramelle", "Muffin", "Oreo", "Ringo", "Fitness", "Pavesini"] },
            { c: "Extra", i: ["Borse G", "Borse M", "Cappelli", "Impermeabili", "Maglie"] }
        ];

        const inventarioVesuvioJet = [
            {n: "💧 ACQUA", v: "323"}, {n: "🥜 ARACHIDI", v: "16"}, {n: "🛍️ BORSE P.", v: "228"}, {n: "🛍️ BORSE M.", v: "0"}, {n: "👜 BORSE G.", v: "21"}, {n: "🍫 BUENO/BISCUITS", v: "60"}, {n: "🧢 CAPPELLI", v: "63"}, {n: "🍬 CARAMELLE", v: "85"}, {n: "☕ CIALDE", v: "136"}, {n: "☕ DECA", v: "10"}, {n: "🍬 DIETOR", v: "40"}, {n: "🌾 FITNESS", v: "45"}, {n: "🍟 FONZIES/PAT.", v: "54"}, {n: "☕ GINSENG", v: "11"}, {n: "🧥 IMPERMEAB.", v: "30"}, {n: "🥛 LATTE", v: "3"}, {n: "🥤 LATTINE", v: "210"}, {n: "👕 MAGLIE", v: "50"}, {n: "🥢 MIKADO", v: "23"}, {n: "🧁 MUFFIN", v: "27"}, {n: "🥜 NIK NOK", v: "23"}, {n: "☕ ORZO", v: "0"}, {n: "🍪 PAVESINI", v: "20"}, {n: "🍺 PERONI", v: "107"}, {n: "🍋 PERONI CAPRI", v: "44"}, {n: "🥔 PRINGLES", v: "58"}, {n: "🍷 PROSECCO/VINO", v: "79"}, {n: "⚡ RED BULL/GAT.", v: "48"}, {n: "🍪 RINGO/OREO", v: "108"}, {n: "🥨 RITZ/CIPSTER", v: "21"}, {n: "🍹 SPRITZ", v: "41"}, {n: "🧃 SUCCO", v: "23"}, {n: "🍵 THE/CAMOM.", v: "45"}, {n: "🍪 TUC", v: "22"}, {n: "🍫 TWIX/KITKAT", v: "90"}
        ];

        let selectedElement = null;

        function init() {
            const selectInv = document.getElementById('mezzo-select-inv');
            listaBarche.forEach(barca => {
                let opt = document.createElement('option');
                opt.value = barca;
                opt.innerText = barca;
                if(barca === "VESUVIO JET") opt.selected = true;
                selectInv.appendChild(opt);
            });

            const container = document.getElementById('ordine-container');
            const savedCarico = JSON.parse(localStorage.getItem('carico_app_jet')) || {};
            
            catalogoOrdine.forEach(cat => {
                let h = document.createElement('div'); h.className = 'category-label'; h.innerText = cat.c; container.appendChild(h);
                cat.i.forEach(art => {
                    let r = document.createElement('div'); r.className = 'item-row';
                    r.onclick = () => selectRow(r, art);
                    const safeId = art.replace(/[^a-zA-Z0-9]/g, '_');
                    const savedVal = savedCarico[safeId] || "0";
                    r.innerHTML = `<span class="name text-sm">${art}</span><div class="qty-box" id="qty-${safeId}">${savedVal}</div>`;
                    container.appendChild(r);
                });
            });

            const savedInv = JSON.parse(localStorage.getItem('inventario_app_jet'));
            if (savedInv) caricaTabellaInventario(savedInv);
            else caricaTabellaInventario(inventarioVesuvioJet);
            
            initCanvas();
        }

        function aggiornaTitoloMezzo(valore) {
            document.getElementById('display-mezzo').innerText = valore;
            saveState();
        }

        function caricaTabellaInventario(dati) {
            const body = document.getElementById('inventory-body');
            body.innerHTML = "";
            dati.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-200 transition";
                const total = item.v.toString().split('+').reduce((a, b) => a + (parseInt(b.trim()) || 0), 0);
                tr.innerHTML = `
                    <td class="p-2 border no-print text-center"><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-checked')" class="w-5 h-5"></td>
                    <td class="p-2 border font-bold item-name">${item.n}</td>
                    <td class="p-1 border"><input type="text" oninput="updateT(this)" class="item-value w-full bg-transparent font-mono text-blue-800 font-bold outline-none" value="${item.v}"></td>
                    <td class="p-1 border text-center font-black bg-slate-50 total-cell">${total}</td>`;
                body.appendChild(tr);
            });
        }

        function switchTab(tab) {
            document.getElementById('section-ordine').classList.toggle('hidden', tab !== 'ordine');
            document.getElementById('section-inventario').classList.toggle('hidden', tab !== 'inventario');
            document.getElementById('main-keypad').classList.toggle('hidden', tab !== 'ordine');
            document.getElementById('tab-ordine').classList.toggle('active-tab', tab === 'ordine');
            document.getElementById('tab-inventario').classList.toggle('active-tab', tab === 'inventario');
            if(tab === 'inventario') resizeCanvas();
        }

        function selectRow(el, id) {
            document.querySelectorAll('.item-row').forEach(r => r.classList.remove('selected'));
            el.classList.add('selected');
            const safeId = id.replace(/[^a-zA-Z0-9]/g, '_');
            selectedElement = document.getElementById(`qty-${safeId}`);
        }

        function press(val) {
            if (!selectedElement) return;
            let current = selectedElement.innerText;
            if (val === 'DEL') {
                selectedElement.innerText = current.length > 1 ? current.slice(0, -1) : "0";
            } else {
                selectedElement.innerText = (current === "0" && val !== '.') ? val : current + val;
            }
            saveState();
        }

        function saveState() {
            const carico = {};
            document.querySelectorAll('.qty-box').forEach(box => {
                carico[box.id.replace('qty-', '')] = box.innerText;
            });
            localStorage.setItem('carico_app_jet', JSON.stringify(carico));

            const inv = [];
            document.querySelectorAll('#inventory-body tr').forEach(r => {
                const nameNode = r.querySelector('.item-name');
                const valNode = r.querySelector('.item-value');
                if (nameNode && valNode) {
                    inv.push({ n: nameNode.innerText, v: valNode.value });
                }
            });
            localStorage.setItem('inventario_app_jet', JSON.stringify(inv));
        }

        function resetCarico() {
            if(!confirm("Cancellare tutto l'ordine attuale?")) return;
            document.querySelectorAll('.qty-box').forEach(box => box.innerText = "0");
            saveState();
        }

        function copiaOrdine() {
            const mezzo = document.getElementById('display-mezzo').innerText;
            let t = `📦 *ORDINE CARICO - ${mezzo}*\n📅 ${new Date().toLocaleDateString()}\n--------------------------\n`;
            let hasItems = false;
            document.querySelectorAll('.qty-box').forEach(box => {
                if(box.innerText !== "0") {
                    const name = box.id.replace('qty-','').replace(/_/g,' ');
                    t += `▪️ *${name}:* ${box.innerText}\n`;
                    hasItems = true;
                }
            });
            if(!hasItems) return alert("Inserisci almeno un prodotto!");
            const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert("Ordine Copiato! Incollalo su WhatsApp.");
        }

        function updateT(i){ 
            const s = i.value.split('+').reduce((a,b)=>a+(parseInt(b.trim())||0),0); 
            const row = i.parentElement.parentElement;
            const totalCell = row.querySelector('.total-cell');
            if (totalCell) totalCell.innerText = s; 
            saveState();
        }

        function salvaTxt() {
            const mezzo = document.getElementById('display-mezzo').innerText;
            let contenuto = `INVENTARIO: ${mezzo}\nDATA: ${new Date().toLocaleString()}\n\n`;
            document.querySelectorAll('#inventory-body tr').forEach(r => {
                const nome = r.querySelector('.item-name')?.innerText;
                const valore = r.querySelector('.item-value')?.value;
                const totale = r.querySelector('.total-cell')?.innerText;
                if (nome) contenuto += `${nome} | ${valore} | TOT: ${totale}\n`;
            });
            const blob = new Blob([contenuto], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Inventario_${mezzo.replace(/\s+/g, '_')}.txt`;
            a.click();
        }

        function salvaCaricoTxt() {
            const mezzo = document.getElementById('display-mezzo').innerText;
            let contenuto = `ORDINE CARICO - ${mezzo}\nDATA: ${new Date().toLocaleString()}\n\n`;
            document.querySelectorAll('.qty-box').forEach(box => {
                if(box.innerText !== "0") {
                    contenuto += `${box.id.replace('qty-','').replace(/_/g,' ')}: ${box.innerText}\n`;
                }
            });
            const blob = new Blob([contenuto], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Carico_${mezzo.replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
        }

        function importaTxt(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const righe = e.target.result.split('\n');
                const datiCaricati = [];
                righe.forEach(riga => {
                    if (riga.includes("|")) {
                        const parti = riga.split("|");
                        datiCaricati.push({ n: parti[0].trim(), v: parti[1].trim() });
                    }
                });
                if (datiCaricati.length > 0) {
                    caricaTabellaInventario(datiCaricati);
                    saveState();
                    alert("Dati importati!");
                }
            };
            reader.readAsText(file);
        }

        // GESTIONE FIRMA MIGLIORATA
        let canvas, ctx, drawing = false;

        function resizeCanvas() {
            if (!canvas) return;
            const rect = canvas.parentNode.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = 180;
            // Ripristina le proprietà del contesto dopo il ridimensionamento
            ctx.lineWidth = 3;
            ctx.lineCap = "round";
            ctx.strokeStyle = "#000";
        }

        function initCanvas() {
            canvas = document.getElementById('signature-pad');
            if(!canvas) return;
            ctx = canvas.getContext('2d');
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };

            const startDrawing = (e) => {
                drawing = true;
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
                if (e.touches) e.preventDefault(); 
            };

            const draw = (e) => {
                if (!drawing) return;
                const pos = getPos(e);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
                if (e.touches) e.preventDefault();
            };

            const stopDrawing = () => {
                drawing = false;
            };

            // Eventi Mouse
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);

            // Eventi Touch (Mobile)
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', draw, { passive: false });
            canvas.addEventListener('touchend', stopDrawing);
        }

        function clearSignature() { 
            if(ctx) ctx.clearRect(0, 0, canvas.width, canvas.height); 
        }

        window.onload = () => {
            init();
            // Piccolo ritardo per assicurarsi che il layout sia pronto per il canvas
            setTimeout(resizeCanvas, 300);
        };
    </script>

</html>
