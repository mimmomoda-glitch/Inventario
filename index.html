        function switchTab(tab) {
            document.getElementById('section-ordine').classList.toggle('hidden', tab !== 'ordine');

            document.getElementById('main-keypad').classList.toggle('hidden', tab !== 'ordine');

            document.getElementById('tab-inventario').classList.toggle('active-tab', tab === 'inventario');

        // --- Logica Ordine ---
        function selectRow(el, id) {
            document.querySelectorAll('.item-row').forEach(r => r.classList.remove('selected'));
            el.classList.add('selected');
            selectedElement = document.getElementById(`qty-${id.replace(/\s+/g, '_')}`);
        }

        function press(val) {
            if (!selectedElement) return;
            let current = selectedElement.innerText;
            if (val === 'DEL') {
                selectedElement.innerText = current.length > 1 ? current.slice(0, -1) : "0";
            } else {
                selectedElement.innerText = (current === "0" && val !== '.') ? val : current + val;

        function copiaOrdine() {
            let t = `📦 *ORDINE SALERNO JET*\n📅 ${new Date().toLocaleDateString()}\n--------------------------\n`;
            let hasItems = false;
            document.querySelectorAll('.qty-box').forEach(box => {
                if(box.innerText !== "0") {
                    t += `▪️ *${box.id.replace('qty-','').replace(/_/g,' ')}:* ${box.innerText}\n`;
                    hasItems = true;
                }
            });
            if(!hasItems) return alert("Nessun prodotto inserito!");
            const el = document.createElement('textarea'); el.value = t; document.body.appendChild(el); el.select();
            document.execCommand('copy'); document.body.removeChild(el);
            alert("Ordine Copiato!");
        }

        // --- Logica Inventario (Nuovo Prospetto) ---
        function caricaMezzo(id) {
            if (!id) return;
            document.getElementById('display-mezzo').innerText = document.getElementById('mezzo-select-inv').options[document.getElementById('mezzo-select-inv').selectedIndex].text;
            const body = document.getElementById('inventory-body');
            body.innerHTML = "";
            const dati = dbInventario[id] || dbInventario.default.map(n => ({n, v:"0"}));
            dati.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-200 transition";
                const total = item.v.toString().split('+').reduce((a, b) => a + (parseInt(b.trim()) || 0), 0);
                tr.innerHTML = `
                    <td class="p-2 border text-center no-print"><input type="checkbox" onchange="this.parentElement.parentElement.classList.toggle('row-checked')" class="w-5 h-5"></td>

                    <td class="p-2 border text-center font-black bg-slate-50 total-cell">${total}</td>`;

            });
        }

        function updateT(i){ 
            const s = i.value.split('+').reduce((a,b)=>a+(parseInt(b.trim())||0),0); 
            i.parentElement.parentElement.querySelector('.total-cell').innerText = s; 
        }

        // --- Firma Digitale ---
        let canvas, ctx, drawing = false;
        function initCanvas() {
            canvas = document.getElementById('signature-pad');
            ctx = canvas.getContext('2d');
            const ratio = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 2.5; ctx.lineCap = "round"; ctx.strokeStyle = "#0f172a";

            const getP = (e) => {
                const r = canvas.getBoundingClientRect();
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: x - r.left, y: y - r.top };
            };

            const start = (e) => { drawing = true; ctx.beginPath(); const p = getP(e); ctx.moveTo(p.x, p.y); };
            const move = (e) => { if(drawing){ const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); } };
            const stop = () => drawing = false;

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); window.addEventListener('touchend', stop);
        }

        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        window.onload = init;
    </script>
