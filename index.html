<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NAV-PRO V128: FULL FEATURE</title>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --txt: #fff; --cyan: #5ac8fa; --apple-blue: #007aff; --lime: #4cd964; --red: #ff3b30; --gold: #ffcc00; --orange: #ff9500; --purple: #af52de; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--txt); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: #000; padding: 10px 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .header b { font-size: 18px; color: var(--lime); }
        .header small { color: #888; text-transform: uppercase; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; overflow-y: auto; flex-grow: 1; padding-bottom: 100px; }
        .product-btn { background: var(--card); height: 85px; border-radius: 12px; display: flex; align-items: center; padding: 10px; border: 1px solid #333; }
        .product-btn i { font-size: 24px; margin-right: 10px; width: 30px; text-align: center; }
        .product-btn b { font-size: 10px; text-transform: uppercase; }
        .product-btn .stock { font-size: 13px; font-weight: bold; color: var(--cyan); display: block; }

        .accordion { background: var(--card); border-radius: 12px; margin: 10px; border: 1px solid #333; overflow: hidden; }
        .acc-header { padding: 15px; background: #2c2c2e; display: flex; justify-content: space-between; align-items: center; }
        .acc-body { display: none; padding: 10px 15px; background: #1c1c1e; }
        .edit-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        .edit-row input { background: #333; border: none; color: var(--cyan); text-align: right; font-size: 16px; font-weight: bold; width: 75px; border-radius: 4px; padding: 5px; }
        
        .footer { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; height: 70px; border-top: 1px solid #333; padding-bottom: env(safe-area-inset-bottom); }
        .footer button { flex: 1; background: none; border: none; color: #888; font-weight: bold; font-size: 10px; }
        .footer button.active { color: var(--cyan); }

        .gestionale { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; padding: 20px; flex-direction: column; }
    </style>
</head>
<body onload="init()">

<div class="header">
    <div><small>Incasso App</small><br><b id="tot-incasso">0.00€</b></div>
    <div style="text-align:right"><small>Valore Bordo</small><br><b id="header-val-carico" style="color:var(--gold)">0.00€</b></div>
</div>

<div id="page-cassa" class="grid"></div>

<div id="page-menu" style="display:none; overflow-y:auto; flex-grow:1; padding-bottom:150px;">
    <h3 style="color:var(--cyan); margin: 15px;">📊 Report & Opzioni</h3>
    
    <div style="padding:0 10px 15px 10px;">
        <button onclick="chiudiGiornata()" style="width:100%; padding:20px; background:var(--lime); color:#000; border:none; border-radius:12px; font-weight:bold; font-size:16px;">☀️ INIZIO NUOVA GIORNATA</button>
    </div>

    <div id="accordion-list"></div>
    
    <div style="padding:15px; display: flex; flex-direction: column; gap: 10px;">
        <button onclick="document.getElementById('fileInput').click()" style="padding:15px; background:var(--orange); border:none; border-radius:10px; color:#000; font-weight:bold;">📤 CARICA BACKUP</button>
        <button onclick="exportJSON()" style="padding:15px; background:var(--apple-blue); border:none; border-radius:10px; color:#fff; font-weight:bold;">📥 SALVA BACKUP</button>
        <input type="file" id="fileInput" style="display:none" onchange="importAndRepair(event)">
    </div>
</div>

<div id="page-history" style="display:none; overflow-y:auto; flex-grow:1; padding-bottom:120px;">
    <h3 style="color:var(--apple-blue); margin: 15px;">📅 Storico Buste</h3>
    <div id="calendar-body" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:5px; padding:10px;"></div>
    <div style="margin:15px; padding:20px; background:var(--card); border-radius:15px; border:2px solid var(--lime); text-align:center;">
        <small style="color:#888;">TOTALE REALE (CALENDARIO)</small>
        <div id="tot-reale-somma" style="font-size:32px; font-weight:bold; color:var(--txt);">0.00€</div>
    </div>
</div>

<div id="gestionale" class="gestionale">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <h2 id="g-nome" style="color:var(--cyan); margin:0;">NOME</h2>
        <button onclick="closeGest()" style="background:none; border:none; color:var(--red); font-size:40px">&times;</button>
    </div>
    <div style="text-align:center; margin-bottom:20px;">
        <div style="display:flex; justify-content:center; align-items:center; gap:30px;">
            <button onclick="changeQty(-1)" style="width:60px; height:60px; border-radius:30px; background:#333; color:white; font-size:25px; border:none;">-</button>
            <b id="g-qty" style="font-size:50px">1</b>
            <button onclick="changeQty(1)" style="width:60px; height:60px; border-radius:30px; background:#333; color:white; font-size:25px; border:none;">+</button>
        </div>
    </div>
    <button onclick="conferma('pas')" style="width:100%; padding:20px; border-radius:12px; border:2px solid var(--gold); background:none; color:var(--gold); font-weight:bold; margin-bottom:10px; font-size:16px;">VENDITA PASSEGGERO</button>
    <button onclick="conferma('pen')" style="width:100%; padding:20px; border-radius:12px; border:2px solid var(--apple-blue); background:none; color:var(--apple-blue); font-weight:bold; margin-bottom:10px; font-size:16px;">VENDITA PENDOLARE</button>
    <button onclick="conferma('omaggio')" style="width:100%; padding:20px; border-radius:12px; border:2px solid var(--purple); background:none; color:var(--purple); font-weight:bold; font-size:16px;">🎁 REGALA (OMAGGIO)</button>
</div>

<div class="footer">
    <button id="btn-c" class="active" onclick="switchTab('c')">🛒 CASSA</button>
    <button id="btn-m" onclick="switchTab('m')">📊 REPORT</button>
    <button id="btn-h" onclick="switchTab('h')">📅 STORICO</button>
</div>

<script>
const masterList = [
    {n:"ACQUA", i:"💧", q:112, c:0, pas:2.0, pen:1.0}, {n:"ARACHIDI+", i:"🥜", q:11, c:0, pas:2.5, pen:1.0},
    {n:"BORSE G", i:"👜", q:17, c:0, pas:10.0, pen:10.0}, {n:"BORSE M", i:"🛍️", q:3, c:0, pas:7.0, pen:7.0},
    {n:"BUENO/BISC", i:"🍫", q:36, c:0, pas:3.0, pen:1.0}, {n:"CAPPELLI", i:"🧢", q:175, c:0, pas:5.0, pen:5.0},
    {n:"CARAMELLE", i:"🍬", q:119, c:0, pas:2.5, pen:1.0}, {n:"CHOCO CHIPS", i:"🍪", q:10, c:0, pas:3.5, pen:2.0},
    {n:"CIALDE", i:"☕", q:160, c:0, pas:2.0, pen:1.0}, {n:"DECA", i:"☕", q:5, c:0, pas:2.0, pen:1.0},
    {n:"FITNESS", i:"🌾", q:3, c:0, pas:2.5, pen:1.5}, {n:"FONZIES", i:"🍟", q:66, c:0, pas:2.5, pen:1.0},
    {n:"GINSENG", i:"☕", q:10, c:0, pas:2.0, pen:1.0}, {n:"IMPERMEAB", i:"🧥", q:57, c:0, pas:5.0, pen:5.0},
    {n:"KINDER CARDS", i:"🃏", q:12, c:0, pas:3.0, pen:1.5}, {n:"LATTINE", i:"🥤", q:245, c:0, pas:2.5, pen:1.5},
    {n:"M&M", i:"🍫", q:24, c:0, pas:2.5, pen:1.5}, {n:"MAGLIE", i:"👕", q:99, c:0, pas:5.0, pen:5.0},
    {n:"NIK NOK", i:"🥜", q:8, c:0, pas:2.5, pen:1.5}, {n:"PAVESINI", i:"🍪", q:15, c:0, pas:2.5, pen:1.0},
    {n:"PERONI", i:"🍺", q:35, c:0, pas:4.5, pen:1.5}, {n:"PERONI C.", i:"🍋", q:15, c:0, pas:7.5, pen:5.5},
    {n:"PRINGLES", i:"🥔", q:17, c:0, pas:3.5, pen:2.0}, {n:"PROSECCO", i:"🍷", q:30, c:0, pas:6.0, pen:3.0},
    {n:"RED BULL", i:"⚡", q:64, c:0, pas:4.5, pen:2.5}, {n:"RINGO/OREO", i:"🍪", q:64, c:0, pas:2.5, pen:1.0},
    {n:"RITZ", i:"🥨", q:9, c:0, pas:4.5, pen:3.0}, {n:"SPRITZ", i:"🍹", q:10, c:0, pas:8.0, pen:5.0},
    {n:"SUCCO", i:"🧃", q:59, c:0, pas:3.5, pen:2.0}, {n:"THE/CAMOM", i:"🍵", q:125, c:0, pas:2.5, pen:1.5},
    {n:"TUC", i:"🍪", q:7, c:0, pas:3.5, pen:2.5}, {n:"TWIX/KIT KAT", i:"🍫", q:81, c:0, pas:2.5, pen:1.5}
];

let db = { prodotti: [], history: {} };
let cur = -1, qty = 1;

function init() {
    const saved = localStorage.getItem('NAV_V128');
    if(saved) { db = JSON.parse(saved); repairData(); } 
    else { hardReset(); }
    render();
}

function repairData() {
    if(!db.history || Array.isArray(db.history)) db.history = {};
    db.prodotti.forEach(p => {
        p.q = Number(p.q)||0; p.c = Number(p.c)||0;
        p.vePas = Number(p.vePas)||0; p.vePen = Number(p.vePen)||0;
        p.omaggio = Number(p.omaggio)||0; // Fix per vecchi dati senza omaggio
    });
}

function chiudiGiornata() {
    if(!confirm("Azzero l'incasso odierno? Le rimanenze restano aggiornate.")) return;
    db.prodotti.forEach(p => {
        p.q = calcF(p);
        p.c = 0; p.vePas = 0; p.vePen = 0; p.omaggio = 0;
    });
    save(); render();
}

function hardReset() {
    db.prodotti = masterList.map(p => ({...p, vePas:0, vePen:0, c:0, omaggio:0}));
    db.history = {};
    save(); render();
}

function save() { localStorage.setItem('NAV_V128', JSON.stringify(db)); }
function calcF(p) { return p.q + p.c - p.vePas - p.vePen - (p.omaggio||0); }

function render() {
    document.getElementById('page-cassa').innerHTML = db.prodotti.map((p,i) => `
        <div class="product-btn" onclick="openGest(${i})">
            <i>${p.i}</i>
            <div><b>${p.n}</b><span class="stock">Disp: ${calcF(p)}</span></div>
        </div>
    `).join('');

    let tInc = 0, tVal = 0;
    document.getElementById('accordion-list').innerHTML = db.prodotti.map((p,i) => {
        let fine = calcF(p);
        tInc += (p.vePas * p.pas) + (p.vePen * p.pen);
        tVal += fine * p.pas;
        return `
        <div class="accordion">
            <div class="acc-header" onclick="toggleAcc(${i})"><b>${p.n}</b> <b style="color:var(--gold)">${(fine*p.pas).toFixed(2)}€</b></div>
            <div id="acc-${i}" class="acc-body">
                <div class="edit-row"><span>Giacenza Inizio:</span> <input type="number" value="${p.q}" onchange="up(${i},'q',this.value)"></div>
                <div class="edit-row"><span>Carico (+):</span> <input type="number" value="${p.c||0}" onchange="up(${i},'c',this.value)"></div>
                <div class="edit-row"><span>Venduto Pas:</span> <input type="number" value="${p.vePas}" onchange="up(${i},'vePas',this.value)"></div>
                <div class="edit-row"><span>Venduto Pen:</span> <input type="number" value="${p.vePen}" onchange="up(${i},'vePen',this.value)"></div>
                <div class="edit-row"><span>Omaggi (-):</span> <input type="number" value="${p.omaggio||0}" onchange="up(${i},'omaggio',this.value)"></div>
                <div style="padding-top:10px; color:var(--purple); font-size:12px; font-weight:bold;">RIMANENZA: ${fine} pz</div>
            </div>
        </div>`;
    }).join('');

    let totR = 0;
    const grid = document.getElementById('calendar-body');
    grid.innerHTML = "";
    for(let d=1; d<=31; d++) {
        let v = Number(db.history[d]) || 0;
        totR += v;
        grid.innerHTML += `<div onclick="setDay(${d})" style="aspect-ratio:1; background:#2c2c2e; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:10px; border:1px solid ${v>0?'var(--lime)':'#444'}"><b>${d}</b><span>${v>0?v+'€':''}</span></div>`;
    }

    document.getElementById('tot-incasso').textContent = tInc.toFixed(2) + "€";
    document.getElementById('header-val-carico').textContent = tVal.toFixed(2) + "€";
    document.getElementById('tot-reale-somma').textContent = totR.toFixed(2) + "€";
    save();
}

function setDay(d) {
    let r = prompt("Incasso giorno "+d, db.history[d]||"");
    if(r!==null) { db.history[d] = parseFloat(r.replace(',','.')) || 0; render(); }
}

function up(i,f,v) { db.prodotti[i][f] = Number(v)||0; render(); }
function toggleAcc(i) { let e=document.getElementById('acc-'+i); e.style.display=e.style.display==='block'?'none':'block'; }
function switchTab(t) {
    document.getElementById('page-cassa').style.display = t=='c'?'grid':'none';
    document.getElementById('page-menu').style.display = t=='m'?'block':'none';
    document.getElementById('page-history').style.display = t=='h'?'block':'none';
    document.querySelectorAll('.footer button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+t).classList.add('active');
}
function openGest(i) { cur=i; qty=1; document.getElementById('g-nome').textContent=db.prodotti[i].n; document.getElementById('g-qty').textContent=qty; document.getElementById('gestionale').style.display='flex'; }
function closeGest() { document.getElementById('gestionale').style.display='none'; }
function changeQty(v) { qty=Math.max(1, qty+v); document.getElementById('g-qty').textContent=qty; }

function conferma(t) { 
    if(t==='pas') db.prodotti[cur].vePas+=qty; 
    else if(t==='pen') db.prodotti[cur].vePen+=qty;
    else if(t==='omaggio') db.prodotti[cur].omaggio = (db.prodotti[cur].omaggio || 0) + qty;
    closeGest(); render(); 
}

function exportJSON() {
    const blob = new Blob([JSON.stringify(db)], {type:'application/json'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="NAV_V128.json"; a.click();
}
function importAndRepair(e) {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=(ev)=>{ 
        try {
            let content = ev.target.result;
            content = content.replace(/\[object Object\]/g, "0");
            db = JSON.parse(content);
            repairData(); render();
            alert("Backup Caricato con Omaggi!");
        } catch(err) { alert("Errore caricamento."); }
    };
    r.readAsText(f);
}
</script>
</body>
</html>
