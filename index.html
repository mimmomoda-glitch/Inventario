<body>

</div>

<div class="content">
    
    <div class="mini-dash">

            <span>Incasso Netto Oggi</span>

        </div>
        <div class="stat">
            <span>Passeggeri</span>

        <div class="stat">
            <span>Pendolari</span>
            <b id="count-pen" style="color:var(--pend)">0</b>

    </div>

    <!-- TAB VENDITE GIORNALIERE -->
    <div id="tab-vendite" class="tab-content active">
        <div id="prod-list-vendite"></div>
    </div>

    <!-- TAB MAGAZZINO E CARICHI -->
    <div id="tab-magazzino" class="tab-content">
        <div id="prod-list-magazzino"></div>
    </div>

    <!-- TAB REPORT E STORICO -->
    <div id="tab-report" class="tab-content">
        <div class="report-section">
            <h3 style="margin-top:0">Storico Periodo Accumulato</h3>
            <div id="period-stats" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                <div class="stat" style="background:#f1f2f6; padding:10px; border-radius:8px;">
                    <span>Tot. Passeggeri</span>
                    <b id="tot-v-pas">0</b>
                </div>
                <div class="stat" style="background:#f1f2f6; padding:10px; border-radius:8px;">
                    <span>Tot. Pendolari</span>
                    <b id="tot-v-pen">0</b>
                </div>
            </div>
            <div id="report-period-items"></div>
        </div>

        <div class="report-section" style="border-top: 4px solid var(--danger);">
            <h3 style="color:var(--danger)">Chiusura Giornaliera</h3>
            <p style="font-size:0.75rem;">Sposta i dati di oggi nello storico e aggiorna le scorte per domani.</p>
            <button class="btn btn-danger" style="width:100%" onclick="chiudiGiornata()">SALVA E AZZERA OGGI</button>
        </div>
    </div>

</div>

<div class="bottom-actions">
    <div class="btn-group">
        <button class="btn btn-neutral" onclick="update()">RICONTROLLA</button>
        <button class="btn btn-success" onclick="openTab('tab-report')">VAI AI TOTALI</button>
    </div>
</div>

<script>
    // Database prodotti corretto con tutti gli item e vendite iniziali
    let prodotti = [
        {id: 'acq', n: "Acqua", i: "💧", p: 2, pen: 1, q: 299, c: 168, vPas: 109, vPen: 0, vPasTot: 109, vPenTot: 0},
        {id: 'ara', n: "Arachidi / Frutta S.", i: "🥜", p: 2.5, pen: 1, q: 16, c: 24, vPas: 11, vPen: 0, vPasTot: 11, vPenTot: 0},
        {id: 'bp', n: "Borse Piccole", i: "👜", p: 6, pen: 5, q: 228, c: 0, vPas: 28, vPen: 0, vPasTot: 28, vPenTot: 0},
        {id: 'bg', n: "Borse Grandi", i: "👜", p: 10, pen: 10, q: 21, c: 0, vPas: 1, vPen: 0, vPasTot: 1, vPenTot: 0},
        {id: 'bue', n: "Bueno/B-Ready/Biscuits", i: "🍫", p: 3, pen: 1, q: 60, c: 0, vPas: 12, vPen: 0, vPasTot: 12, vPenTot: 0},
        {id: 'cap', n: "Cappelli", i: "🧢", p: 5, pen: 5, q: 63, c: 0, vPas: 9, vPen: 0, vPasTot: 9, vPenTot: 0},
        {id: 'cpe', n: "Cappuccino Extra", i: "☕✨", p: 3.5, pen: 1.5, q: 0, c: 0, vPas: 0, vPen: 0, vPasTot: 0, vPenTot: 0},
        {id: 'car', n: "Caramelle / Gomme", i: "🍬", p: 2.5, pen: 1, q: 85, c: 0, vPas: 5, vPen: 0, vPasTot: 5, vPenTot: 0},
        {id: 'cia', n: "Cialde", i: "☕", p: 2, pen: 1, q: 136, c: 300, vPas: 82, vPen: 0, vPasTot: 82, vPenTot: 0},
        {id: 'dec', n: "Deca", i: "☕", p: 2, pen: 1, q: 10, c: 0, vPas: 0, vPen: 0, vPasTot: 0, vPenTot: 0},
        {id: 'fit', n: "Fitness / Cereal Yo", i: "🌾", p: 2.5, pen: 1, q: 24, c: 0, vPas: 6, vPen: 0, vPasTot: 6, vPenTot: 0},
        {id: 'fon', n: "Fonzies / Patatine", i: "🍟", p: 2.5, pen: 1, q: 75, c: 92, vPas: 33, vPen: 0, vPasTot: 33, vPenTot: 0},
        {id: 'gin', n: "Ginseng", i: "☕", p: 2, pen: 1, q: 11, c: 0, vPas: 0, vPen: 0, vPasTot: 0, vPenTot: 0},
        {id: 'ltn', n: "Lattine", i: "🥤", p: 2.5, pen: 1.5, q: 233, c: 144, vPas: 58, vPen: 0, vPasTot: 58, vPenTot: 0},
        {id: 'mik', n: "Mikado", i: "🥖", p: 3, pen: 1, q: 23, c: 0, vPas: 1, vPen: 0, vPasTot: 1, vPenTot: 0},
        {id: 'muf', n: "Muffin", i: "🧁", p: 3, pen: 1, q: 27, c: 0, vPas: 4, vPen: 0, vPasTot: 4, vPenTot: 0},
        {id: 'nik', n: "Nik Nok", i: "🥜", p: 2.5, pen: 1, q: 23, c: 24, vPas: 4, vPen: 0, vPasTot: 4, vPenTot: 0},
        {id: 'per', n: "Peroni", i: "🍺", p: 4.5, pen: 1.5, q: 107, c: 120, vPas: 73, vPen: 0, vPasTot: 73, vPenTot: 0},
        {id: 'pca', n: "Peroni Capri", i: "🍋", p: 7.5, pen: 5.5, q: 44, c: 24, vPas: 7, vPen: 0, vPasTot: 7, vPenTot: 0},
        {id: 'pri', n: "Pringles", i: "🥔", p: 3.5, pen: 2, q: 60, c: 48, vPas: 18, vPen: 0, vPasTot: 18, vPenTot: 0},
        {id: 'vin', n: "Prosecco / Vino", i: "🍷", p: 6, pen: 3, q: 79, c: 24, vPas: 18, vPen: 0, vPasTot: 18, vPenTot: 0},
        {id: 'red', n: "Red Bull / Gatorade", i: "⚡", p: 4.5, pen: 2.5, q: 40, c: 0, vPas: 8, vPen: 0, vPasTot: 8, vPenTot: 0},
        {id: 'rin', n: "Ringo / Oreo / Baiocchi", i: "🍪", p: 2.5, pen: 1, q: 108, c: 0, vPas: 14, vPen: 0, vPasTot: 14, vPenTot: 0},
        {id: 'riz', n: "Ritz / Cipster", i: "🍪", p: 2.5, pen: 1, q: 21, c: 0, vPas: 4, vPen: 0, vPasTot: 4, vPenTot: 0},
        {id: 'spr', n: "Spritz", i: "🍹", p: 8, pen: 5, q: 41, c: 48, vPas: 29, vPen: 0, vPasTot: 29, vPenTot: 0},
        {id: 'tuc', n: "Tuc", i: "🍪", p: 2.5, pen: 1, q: 22, c: 0, vPas: 6, vPen: 0, vPasTot: 6, vPenTot: 0},
        {id: 'twi', n: "Twix/KitKat/M&M...", i: "🍫", p: 2.5, pen: 1.5, q: 90, c: 0, vPas: 28, vPen: 0, vPasTot: 28, vPenTot: 0}
    ];

    function openTab(id) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        const btns = document.querySelectorAll('.tab-btn');
        if(id === 'tab-vendite') btns[0].classList.add('active');
        if(id === 'tab-magazzino') btns[1].classList.add('active');
        if(id === 'tab-report') btns[2].classList.add('active');
        window.scrollTo(0,0);
    }

    function init() {
        const vList = document.getElementById('prod-list-vendite');
        const mList = document.getElementById('prod-list-magazzino');
        vList.innerHTML = ''; mList.innerHTML = '';

        prodotti.forEach(p => {
            vList.innerHTML += `
                <div class="product-card">
                    <div class="prod-header">
                        <span class="prod-name">${p.i} ${p.n}</span>
                        <span class="badge">Periodo: ${p.vPasTot + p.vPenTot}</span>
                    </div>
                    <div class="input-group">
                        <div class="field">
                            <label>OGGI PAS.</label>
                            <input type="number" id="vpas-${p.id}" value="${p.vPas}" onchange="update()">
                        </div>
                        <div class="field">
                            <label>OGGI PEN.</label>
                            <input type="number" id="vpen-${p.id}" value="${p.vPen}" onchange="update()">
                        </div>
                    </div>
                </div>`;

            mList.innerHTML += `
                <div class="product-card" style="border-left-color: var(--pend)">
                    <div class="prod-header">
                        <span class="prod-name">${p.i} ${p.n}</span>
                    </div>
                    <div class="input-group">
                        <div class="field">
                            <label>INIZIO GIORNO</label>
                            <input type="number" id="q-${p.id}" value="${p.q}" onchange="update()">
                        </div>
                        <div class="field">
                            <label>CARICO DDT</label>
                            <input type="number" id="c-${p.id}" value="${p.c}" onchange="update()">
                        </div>
                    </div>
                    <div class="info-row">
                        <span>Rimanenza: <b id="rem-${p.id}">0</b></span>
                        <span>Disp. Tot: ${(p.q + p.c)}</span>
                    </div>
                </div>`;
        });
        update();
    }

    function update() {
        let incassoOggi = 0;
        let totPasPeriodo = 0;
        let totPenPeriodo = 0;
        let reportPeriodoHtml = '';

        prodotti.forEach(p => {
            const vPasInput = document.getElementById(`vpas-${p.id}`);
            const vPenInput = document.getElementById(`vpen-${p.id}`);
            const qInput = document.getElementById(`q-${p.id}`);
            const cInput = document.getElementById(`c-${p.id}`);

            if(!vPasInput) return;

            const vPas = parseInt(vPasInput.value) || 0;
            const vPen = parseInt(vPenInput.value) || 0;
            const q = parseInt(qInput.value) || 0;
            const c = parseInt(cInput.value) || 0;

            // Sincronizzo oggetto locale
            p.vPas = vPas; p.vPen = vPen; p.q = q; p.c = c;

            // Rimanenza
            const rem = (q + c) - (vPas + vPen);
            document.getElementById(`rem-${p.id}`).innerText = rem;
            document.getElementById(`rem-${p.id}`).style.color = rem < 0 ? 'var(--danger)' : 'var(--success)';

            // Calcolo Incasso di "Oggi" basato sui campi input
            incassoOggi += (vPas * p.p) + (vPen * p.pen);
            
            // Storico Totale del periodo
            totPasPeriodo += p.vPasTot;
            totPenPeriodo += p.vPenTot;

            if(p.vPasTot + p.vPenTot > 0) {
                reportPeriodoHtml += `
                <div style="display:flex; justify-content:space-between; font-size:0.85rem; margin-bottom:5px; border-bottom:1px solid #f0f0f0; padding-bottom:5px;">
                    <span>${p.i} ${p.n}</span>
                    <span><b>${p.vPasTot + p.vPenTot}</b> <small>(Pas:${p.vPasTot}/Pen:${p.vPenTot})</small></span>
                </div>`;
            }
        });

        // Visualizzazione Dashboard
        document.getElementById('m-netto').innerText = `€ ${incassoOggi.toFixed(2)}`;
        document.getElementById('tot-v-pas').innerText = totPasPeriodo;
        document.getElementById('tot-v-pen').innerText = totPenPeriodo;
        document.getElementById('report-period-items').innerHTML = reportPeriodoHtml;
        
        document.getElementById('count-pas').innerText = prodotti.reduce((a,b) => a + b.vPas, 0);
        document.getElementById('count-pen').innerText = prodotti.reduce((a,b) => a + b.vPen, 0);
    }

    function chiudiGiornata() {
        if(!confirm("Vuoi chiudere il turno?\n\nLe vendite di oggi verranno sommate allo storico e le rimanenze diventeranno lo stock di domani.")) return;

        prodotti.forEach(p => {
            // Sommo i valori attuali allo storico
            p.vPasTot += p.vPas;
            p.vPenTot += p.vPen;

            // Calcolo scorta per domani
            p.q = (p.q + p.c) - (p.vPas + p.vPen);
            p.c = 0;
            
            // Azzero l'oggi
            p.vPas = 0;
            p.vPen = 0;
        });

        alert("Turno salvato con successo!");
        init();
        openTab('tab-report');
    }

    window.onload = init;
</script>

</body>
</html>
